version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: docflow_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password_12345
      MYSQL_DATABASE: docflow_db
      MYSQL_USER: docflow_user
      MYSQL_PASSWORD: docflow_password_12345
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: docflow_api
    restart: always
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: mysql://root:root_password_12345@mysql:3306/docflow_db
      JWT_SECRET: super_secure_token_secret_98765
      PORT: 3001
    depends_on:
      - mysql

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: docflow_web
    restart: always
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      PORT: 3000
    depends_on:
      - api

volumes:
  mysql_data:
